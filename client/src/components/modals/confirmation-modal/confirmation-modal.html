<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" (click)="cancelled.emit()">
  <div class="bg-base-200 rounded-2xl shadow-xl p-6 w-80 flex flex-col gap-4" (click)="$event.stopPropagation()">
    <h3 class="text-lg font-semibold text-white">Confirmation</h3>
    <p class="text-gray-300 text-sm">{{ message() }}</p>
    <div class="flex justify-end gap-2">
      <button class="btn btn-ghost btn-sm" (click)="cancelled.emit()">Cancel</button>
      <button class="btn btn-error btn-sm" (click)="confirmed.emit()">Delete</button>
    </div>
  </div>
</div>
