<div class="flex flex-col h-full p-4 gap-2 overflow-y-auto">
  @for (message of messages(); track message.id) {
    @if (message.senderID === currentUserId) {
      <div class="flex justify-end">
        <div class="max-w-xs lg:max-w-md bg-primary text-white rounded-2xl rounded-br-none px-4 py-2">
          <p class="text-sm">{{message.content}}</p>
          <span class="text-xs opacity-70 float-right mt-1">{{message.messageSent | date:'H:mm'}}</span>
        </div>
      </div>
    } @else {
      <div class="flex items-end gap-2">
        @if (message.senderImageUrl) {
          <img [src]="message.senderImageUrl" class="w-7 h-7 rounded-full object-cover shrink-0"/>
        } @else {
          <div class="w-7 h-7 rounded-full bg-base-300 shrink-0"></div>
        }
        <div class="max-w-xs lg:max-w-md bg-base-100 text-white rounded-2xl rounded-bl-none px-4 py-2">
          <p class="text-sm">{{message.content}}</p>
          <span class="text-xs text-gray-400 float-right mt-1">{{message.messageSent | date:'H:mm'}}</span>
        </div>
      </div>
    }
  } @empty {
    <div class="flex justify-center items-center h-full text-gray-500">
      No messages yet
    </div>
  }
</div>
