<div class="card bg-base-100 w-1/3 max-auto flex flex-col p-6 rounded-lg shadow-lg">
  <div class="card-title justify-center text-3xl text-primary">Sing up</div>
  <div class="card-body w-full">
    <form [formGroup]="registerForm" class="flex flex-col w-full gap-3 test" (ngSubmit)="register()">

      <label class="floating-label">
        <span [class.text-error]="registerForm.controls['displayName'].invalid && registerForm.controls['displayName'].touched">
          DisplayName
        </span>
        <input
          class="input w-full"
          [class.input-error]="registerForm.controls['displayName'].invalid && registerForm.controls['displayName'].touched"
          formControlName="displayName"
          placeholder="DisplayName"
        >
      </label>

      <label class="floating-label">
         <span [class.text-error]="registerForm.controls['email'].invalid && registerForm.controls['email'].touched">
          Email
        </span>
        <input
          class="input w-full"
          [class.input-error]="registerForm.controls['email'].invalid && registerForm.controls['email'].touched"
          formControlName="email"
          placeholder="Email"
        >
      </label>

      <label class="floating-label">
        <span [class.text-error]="registerForm.controls['birthDay'].invalid && registerForm.controls['birthDay'].touched">
          BirthDay
        </span>
        <input
          [attr.max]="maxDate()"
          type="date"
          class="input w-full"
          [class.input-error]="registerForm.controls['birthDay'].invalid && registerForm.controls['birthDay'].touched"
          formControlName="birthDay"
          placeholder="BirthDay"
        >
      </label>

      <label class="floating-label">
        <span [class.text-error]="registerForm.controls['country'].invalid && registerForm.controls['country'].touched">
          Сountry
        </span>
        <input
          class="input w-full"
          [class.input-error]="registerForm.controls['country'].invalid && registerForm.controls['country'].touched"
          formControlName="country"
          placeholder="Country"
        >
      </label>

      <label class="floating-label">
        <span [class.text-error]="registerForm.controls['city'].invalid && registerForm.controls['city'].touched">
          City
        </span>
        <input
          class="input w-full"
          [class.input-error]="registerForm.controls['city'].invalid && registerForm.controls['city'].touched"
          formControlName="city"
          placeholder="City"
        >
      </label>

      <label class="floating-label">
        <span [class.text-error]="registerForm.controls['password'].invalid && registerForm.controls['password'].touched">
          Password
        </span>
        <input
          type="password"
          class="input w-full"
          [class.input-error]="registerForm.controls['password'].invalid && registerForm.controls['password'].touched"
          formControlName="password"
          placeholder="Password"
        >
        @if (registerForm.controls['password'].touched) {
          @if (registerForm.controls['password'].hasError('required')) {
            <span class="text-error text-sm">Password is required</span>
          } @else if (registerForm.controls['password'].hasError('minlength')) {
            <span class="text-error text-sm">Password must be at least 4 characters</span>
          } @else if (registerForm.controls['password'].hasError('maxlength')) {
            <span class="text-error text-sm">Password must be at most 10 characters</span>
          }
        }
      </label>

      @if (validationErrors().length > 0) {
        <div class="alert alert-error flex flex-col items-start gap-1 p-3">
          @for (error of validationErrors(); track error) {
            <span class="text-sm">{{ error }}</span>
          }
        </div>
      }

      <div class="flex items-center justify-end gap-3"></div>
      <button [disabled]="!registerForm.valid" class="btn btn-primary" type="submit">Register</button>
      <button class="btn" (click)="cancel()" type="button">Cancel</button>
    </form>
  </div>
</div>
