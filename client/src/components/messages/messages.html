<div class="max-w-4xl mx-auto p-6">
  <h2 class="text-2xl font-semibold text-white mb-6">Messages</h2>

  <div class="flex flex-col gap-3">
    @for (message of messages(); track message.id) {
      <div
        class="flex items-start gap-4 bg-base-200 rounded-xl p-4 hover:bg-base-300 transition cursor-pointer"
        [routerLink]="['/messages', getInterlocutorId(message)]"
      >
        <img
          [src]="message.senderImageUrl || 'https://placehold.co/40'"
          alt="avatar"
          class="w-10 h-10 rounded-full object-cover"
        />

        <div class="flex flex-col flex-1 min-w-0">
          <div class="flex justify-between items-center">
            <span class="text-white font-medium">{{message.senderDisplayName}}</span>
            <span class="text-xs text-gray-400">{{message.messageSent | date:'d MMM y, HH:mm'}}</span>
          </div>
          <p class="text-gray-400 text-sm truncate">{{message.content}}</p>
        </div>

        @if (!message.dateRead) {
          <span class="w-2 h-2 rounded-full bg-primary mt-2 shrink-0"></span>
        }
      </div>
    } @empty {
      <div class="flex justify-center items-center h-40 text-gray-500">
        No messages yet
      </div>
    }
  </div>
</div>
