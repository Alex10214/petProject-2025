<div class="flex flex-col max-w-3xl mx-auto h-[calc(100vh-88px)] p-4">

  <div class="flex justify-start mb-2">
    <button routerLink="/messages" class="btn btn-ghost btn-sm text-gray-400 hover:text-white">
      ← Back
    </button>
  </div>

  <div class="flex flex-col flex-1 bg-base-200 rounded-2xl overflow-hidden shadow-lg">

    <div class="flex flex-col gap-2 overflow-y-auto flex-1 p-4">
      @for (message of messages(); track message.id) {
        @if (message.senderID === currentUserId) {
          <div class="flex justify-end">
            <div class="max-w-xs lg:max-w-md bg-primary text-white rounded-2xl rounded-br-none px-4 py-2">
              <p class="text-sm">{{message.content}}</p>
              <span class="text-xs opacity-70 float-right mt-1">{{message.messageSent | date:'H:mm'}}</span>
            </div>
          </div>
        } @else {
          <div class="flex">
            <div class="max-w-xs lg:max-w-md bg-base-300 text-white rounded-2xl rounded-bl-none px-4 py-2">
              <p class="text-sm">{{message.content}}</p>
              <span class="text-xs text-gray-400 float-right mt-1">{{message.messageSent | date:'H:mm'}}</span>
            </div>
          </div>
        }
      } @empty {
        <div class="flex justify-center items-center py-10 text-gray-500">
          No messages yet
        </div>
      }
    </div>

    <div class="flex items-center gap-2 border-t border-base-300 p-4 bg-base-200">
      <input
        [(ngModel)]="newMessage"
        (keyup.enter)="sendMessage()"
        type="text"
        placeholder="Write a message..."
        class="input flex-1 bg-base-300 text-white border-none focus:outline-none"
      />
      <button
        (click)="sendMessage()"
        class="btn btn-primary btn-sm px-6"
        [disabled]="!newMessage.trim()"
      >
        Send
      </button>
    </div>

  </div>
</div>
